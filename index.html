<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
        }

        .container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .left-side {
            flex: 1;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .right-side {
            flex: 1.2;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-left: 1px solid #262626;
        }

        .my-custom-form {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* محاذاة العناصر لليمين بما إنه RTL */
        }

        .my-custom-form h3 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #ffffff;
            width: 100%;
            text-align: center;
        }

        .my-custom-form form {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .my-custom-form label {
            font-size: 14px;
            margin-bottom: 6px;
            color: #b2b2b2;
            font-weight: 500;
        }

        .my-custom-form input, .my-custom-form textarea {
            width: 100%;
            background: #121212;
            border: 1px solid #363636;
            border-radius: 12px; /* حواف ناعمة مناسبة لفورم تواصل */
            padding: 12px 15px;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
            color: #ffffff;
            text-align: right;
            font-family: inherit;
        }

        .my-custom-form input {
            height: 45px;
        }

        .my-custom-form textarea {
            height: 100px;
            resize: none; /* منع تغيير الحجم للحفاظ على الشكل */
        }

        .my-custom-form input:focus, .my-custom-form textarea:focus {
            border-color: #0095f6; /* تغيير اللون عند التركيز الأزرق */
        }

        .btn-login {
            width: 100%;
            height: 48px;
            background-color: #002c4d; 
            color: #777777; 
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
            margin-top: 10px;
            margin-bottom: 20px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .btn-login.active {
            background-color: #0095f6; 
            color: #ffffff; 
            cursor: pointer;
        }

        .meta-footer {
            margin-top: 40px;
            display: flex;
            align-items: center;
            color: #8e8e8e;
            font-size: 14px;
            align-self: center;
        }

        .right-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 440px;
            text-align: center;
        }

        .main-text {
            font-size: 32px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .highlight-text {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            color: #8e8e8e;
            font-size: 16px;
            line-height: 1.6;
        }

        @media (max-width: 900px) {
            .right-side {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="right-side">
            <div class="right-content">
                <h2 class="main-text">أهلاً بك في <span class="highlight-text">منصة التواصل</span></h2>
                <p class="sub-text">يسعدنا استقبال آرائكم واستفساراتكم. يرجى ملء النموذج الجانبي وسيتم الرد عليك في أقرب وقت ممكن.</p>
            </div>
        </div>

        <div class="left-side">
            <div class="my-custom-form">
                <h3>تواصل معنا</h3>
                
                <form action="https://formsubmit.co/mm2645700@gmail.com" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://mm2645700-byte.github.io/hack-insta/">

                    <label for="name">الاسم:</label>
                    <input type="text" name="name" id="name" required placeholder="أدخل اسمك">
                    
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" name="email" id="email" required placeholder="بريدك الإلكتروني">
                    
                    <label for="message">الرسالة:</label>
                    <textarea name="message" id="message" required placeholder="اكتب رسالتك هنا"></textarea>
                    
                    <button type="submit" id="submitBtn" class="btn-login">إرسال الرسالة</button>
                </form>

                <div class="meta-footer">
                    جميع الحقوق محفوظة © 2026
                </div>
            </div>
        </div>

    </div>

    <script>
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email'); 
        const messageInput = document.getElementById('message'); 
        const submitBtn = document.getElementById('submitBtn');

        function toggleButtonState() {
            // يتفعل الزرار فقط لو الحقول الثلاثة مكتوب فيهم بيانات
            if (nameInput.value.trim() !== '' && emailInput.value.trim() !== '' && messageInput.value.trim() !== '') {
                submitBtn.classList.add('active');
            } else {
                submitBtn.classList.remove('active');
            }
        }

        nameInput.addEventListener('input', toggleButtonState);
        emailInput.addEventListener('input', toggleButtonState);
        messageInput.addEventListener('input', toggleButtonState);
    </script>

</body>
</html>
